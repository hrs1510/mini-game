<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Grid Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <h1>Himanshu's Mini Game</h1>
        <div class="board-layout">
            <div class="status-panel">
                <div class="status-card timer-card" id="timer">Time: 60</div>
                <div class="status-card score-card" id="score"> Your Score: 0</div>
            </div>
        </div>
        <div class="controls">
            <button id="start-button">Start Game</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
